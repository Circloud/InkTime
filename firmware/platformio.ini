; PlatformIO Project Configuration File
; 7.3" E6 6-color e-ink display full firmware for ESP32-S3-WROOM-1-N8R8
; WiFi-enabled photo frame with AP mode configuration portal

[env:esp32-s3]
platform = espressif32
framework = arduino

; Use Freenove ESP32-S3 WROOM board (N8R8 variant with built-in PSRAM support)
; Board definition already includes 8MB Flash / 8MB PSRAM configuration
board = freenove_esp32_s3_wroom

; Build flags for PSRAM
; BOARD_HAS_PSRAM enables Arduino PSRAM functions (ps_malloc, etc.)
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Partition scheme: single large app (no OTA)
board_build.partitions = huge_app.csv

; Serial monitor for debug output
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build type for production
build_type = release

; Library dependencies
lib_deps =
    https://github.com/ZinggJM/GxEPD2.git